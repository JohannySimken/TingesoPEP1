spring.application.name=backend
server.port=8090

#database
spring.datasource.url=jdbc:postgresql://localhost:5432/travelagency_db
spring.datasource.username=postgres
spring.datasource.password=2274
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true


# App config
app.reservation.expiry-hours=24
app.discount.group-threshold=4
app.discount.group-percentage=10
app.discount.frequent-client-threshold=3
app.discount.frequent-client-percentage=5
app.discount.multi-package-percentage=5
app.discount.max-accumulated=20
app.discount.accumulate=true


# Keycloak
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/travel-agency