services:
  postgres:
    image: postgres:16-alpine
    container_name: travelagency-postgres
    environment:
      POSTGRES_DB: travelagency_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "2274"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - travelagency-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: travelagency-keycloak
    command: start-dev --import-realm 
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/travelagency_db
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: "2274"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    volumes:
      - ./travel-agency-realm.json:/opt/keycloak/data/import/travel-agency-realm.json:ro
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - travelagency-net

  backend1:
    image: wolfhix/travelagency-backend:latest
    environment: &backend-env
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/travelagency_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: "2274"
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://localhost:8080/realms/travel-agency
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/travel-agency/protocol/openid-connect/certs
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks:
      - travelagency-net

  backend2:
    image: wolfhix/travelagency-backend:latest
    environment: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks:
      - travelagency-net

  backend3:
    image: wolfhix/travelagency-backend:latest
    environment: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks:
      - travelagency-net

  backend-lb:
    image: nginx:alpine
    container_name: travelagency-backend-lb
    volumes:
      - ./nginx-backend.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend1
      - backend2
      - backend3
    networks:
      - travelagency-net

  frontend1:
    image: wolfhix/travelagency-frontend:latest
    container_name: travelagency-frontend1
    depends_on:
      - backend-lb
    networks:
      - travelagency-net

  frontend2:
    image: wolfhix/travelagency-frontend:latest
    container_name: travelagency-frontend2
    depends_on:
      - backend-lb
    networks:
      - travelagency-net

  frontend3:
    image: wolfhix/travelagency-frontend:latest
    container_name: travelagency-frontend3
    depends_on:
      - backend-lb
    networks:
      - travelagency-net

  frontend-lb:
    image: nginx:alpine
    container_name: travelagency-frontend-lb
    volumes:
      - ./nginx-frontend.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend1
      - frontend2
      - frontend3
    ports:
      - "8070:80"
    networks:
      - travelagency-net

volumes:
  postgres_data:

networks:
  travelagency-net:
    driver: bridge
